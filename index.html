<!DOCTYPE html>
<html>
<head>
    <title>Nexus Chat - Group Chats</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; margin: 20px; }
        #container { display: flex; height: 600px; }
        #sidebar { width: 250px; border-right: 1px solid #ccc; padding: 10px; }
        #main { flex: 1; padding: 10px; display: flex; flex-direction: column; }
        #users-list, #groups-list { list-style: none; padding: 0; margin: 0; }
        #users-list li, #groups-list li {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        #users-list li:hover, #groups-list li:hover { background-color: #f0f0f0; }
        #users-list li.selected, #groups-list li.selected { background-color: #e0e0ff; }
        #messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message { margin: 5px 0; }
        .message .sender { font-weight: bold; color: #0066cc; }
        .message .time { font-size: 0.8em; color: #999; margin-left: 10px; }
        .my-message { text-align: right; }
        .my-message .sender { color: #00aa00; }
        .group-message .sender { color: #cc6600; }
        #input-area { display: flex; }
        #message-input { flex: 1; padding: 8px; }
        button { padding: 8px 16px; margin-left: 5px; cursor: pointer; }
        #status { margin-top: 10px; font-size: 0.9em; color: #666; }
        .tab {
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            background: #f0f0f0;
            margin-right: 5px;
        }
        .tab.active { background: #e0e0ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #create-group-form { margin-top: 10px; padding: 10px; background: #f9f9f9; }
        #group-members { list-style: none; padding: 0; }
        #group-members li { padding: 3px 0; }
    </style>
</head>
<body>
    <h1>Nexus Messenger - Group Chats</h1>

    <div>
        <input id="token" placeholder="JWT Token" size="60" value="" />
        <button onclick="connect()">Connect</button>
        <span id="connection-status">Disconnected</span>
    </div>

    <div id="container" style="display: none;">
        <div id="sidebar">
            <div class="tab" onclick="showTab('users')" id="tab-users">Users</div>
            <div class="tab" onclick="showTab('groups')" id="tab-groups">Groups</div>

            <div id="users-tab" class="tab-content active">
                <h3>Online Users</h3>
                <button onclick="getOnlineUsers()">Refresh</button>
                <ul id="users-list"></ul>
            </div>

            <div id="groups-tab" class="tab-content">
                <h3>My Groups</h3>
                <button onclick="showCreateGroupForm()">+ New Group</button>
                <ul id="groups-list"></ul>

                <div id="create-group-form" style="display: none;">
                    <h4>Create Group</h4>
                    <input id="group-name" placeholder="Group name" /><br/>
                    <div>Select members:</div>
                    <div id="available-users"></div>
                    <button onclick="createGroup()">Create</button>
                    <button onclick="hideCreateGroupForm()">Cancel</button>
                </div>
            </div>
        </div>

        <div id="main">
            <div id="current-chat">
                <span id="chat-type"></span>
                Chat with: <span id="current-recipient">None</span>
            </div>

            <!-- НОВЫЙ КОНТЕЙНЕР ДЛЯ ИНФОРМАЦИИ О ГРУППЕ -->
            <div id="group-info-container" style="display: none; background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px;"></div>

            <div id="messages"></div>

            <div id="input-area">
                <input id="message-input" type="text" placeholder="Type your message..." />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div id="status"></div>

    <script>
        let ws;
        let currentUser = null;
        let selectedUser = null;
        let selectedGroup = null;
        let currentChatType = 'private'; // 'private' or 'group'
        let onlineUsers = [];

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ВКЛАДКАМИ ==========
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ СО СТАТУСОМ ==========
        function showStatus(message) {
            document.getElementById('status').innerText = message;
            setTimeout(() => {
                document.getElementById('status').innerText = '';
            }, 3000);
        }

        // ========== ФУНКЦИИ ПОДКЛЮЧЕНИЯ ==========
        function connect() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('Please enter token');
                return;
            }

            // Декодируем токен чтобы узнать текущего пользователя
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = payload.username;
                console.log("Current user:", currentUser);
            } catch (e) {
                console.log('Could not decode token');
            }

            ws = new WebSocket(`ws://${window.location.host}/ws?token=${token}`);

            ws.onopen = () => {
                document.getElementById('connection-status').innerText = 'Connected';
                document.getElementById('container').style.display = 'flex';
                getOnlineUsers();
                getMyGroups();
            };

            ws.onclose = () => {
                document.getElementById('connection-status').innerText = 'Disconnected';
                document.getElementById('container').style.display = 'none';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showStatus('Connection error');
            };
        }

        // ========== ОБРАБОТКА ВХОДЯЩИХ СООБЩЕНИЙ ==========
        function handleMessage(data) {
            console.log('Received:', data);

            switch(data.type) {
                case 'online_users':
                    updateUsersList(data.payload);
                    break;

                case 'status':
                    // Игнорируем статусные сообщения
                    break;

                case 'private_message':
                    if (currentChatType === 'private' && selectedUser === data.payload.from) {
                        displayPrivateMessage(data.payload);
                    } else {
                        showStatus(`💬 New message from ${data.payload.from}`);
                    }
                    break;

                case 'group_message':
                    if (currentChatType === 'group' && selectedGroup &&
                        selectedGroup.id === data.payload.conversation_id) {
                        displayGroupMessage(data.payload);
                    } else {
                        showStatus(`👥 New message in ${data.payload.group_name} from ${data.payload.from}`);
                    }
                    break;

                case 'my_groups':
                    updateGroupsList(data.payload);
                    break;

                case 'group_created':
                    showStatus(`Group "${data.payload.name}" created successfully!`);
                    getMyGroups(); // Обновляем список групп
                    break;

                case 'group_info':
                    displayGroupInfo(data.payload);
                    break;

                case 'added_to_group':
                    showStatus(`✨ You were added to group: ${data.payload.group_name} by ${data.payload.added_by}`);
                    getMyGroups(); // Обновляем список групп
                    break;

                case 'group_updated':
                    if (selectedGroup && selectedGroup.id === data.payload.group_id) {
                        displayGroupInfo(data.payload);
                    }
                    break;

                case 'group_history':
                    displayGroupHistory(data.payload);
                    break;

                case 'private_history':
                    displayPrivateHistory(data.payload);
                    break;

                case 'message_sent':
                    // Убираем (sending...) из всех временных сообщений
                    document.querySelectorAll('.sending-indicator').forEach(indicator => {
                        indicator.remove();
                    });
                    break;

                case 'error':
                    alert('Error: ' + data.payload.message);
                    break;

                default:
                    console.log('Unknown message type:', data.type);
            }
        }

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ СО СПИСКАМИ ==========
        function updateUsersList(users) {
            onlineUsers = users;
            const list = document.getElementById('users-list');
            list.innerHTML = '';

            users.forEach(user => {
                if (currentUser && user.username === currentUser) return;

                const li = document.createElement('li');
                li.textContent = user.username;
                li.onclick = () => selectUser(user.username);
                if (selectedUser === user.username) {
                    li.classList.add('selected');
                }
                list.appendChild(li);
            });

            // Обновляем список доступных пользователей для создания группы
            updateAvailableUsers();
        }

        function updateGroupsList(groups) {
            console.log("Updating groups list:", groups);
            const list = document.getElementById('groups-list');
            list.innerHTML = '';

            if (!groups || groups.length === 0) {
                list.innerHTML = '<li style="color:#999;">No groups yet</li>';
                return;
            }

            groups.forEach(group => {
                const li = document.createElement('li');
                li.textContent = group.name || 'Unnamed Group';
                li.setAttribute('data-group-id', group.id);
                li.onclick = () => selectGroup(group);
                if (selectedGroup && selectedGroup.id === group.id) {
                    li.classList.add('selected');
                }
                list.appendChild(li);
            });
        }

        function updateAvailableUsers() {
            const container = document.getElementById('available-users');
            if (!container) return;

            container.innerHTML = '';
            onlineUsers.forEach(user => {
                if (user.username !== currentUser) {
                    const div = document.createElement('div');
                    div.innerHTML = `<input type="checkbox" value="${user.username}"> ${user.username}`;
                    container.appendChild(div);
                }
            });
        }

        // ========== ФУНКЦИИ ВЫБОРА ПОЛЬЗОВАТЕЛЯ/ГРУППЫ ==========
        function selectUser(username) {
            selectedUser = username;
            selectedGroup = null;
            currentChatType = 'private';
            document.getElementById('current-recipient').textContent = username;
            document.getElementById('chat-type').textContent = '👤';

            // Скрываем контейнер с информацией о группе
            document.getElementById('group-info-container').style.display = 'none';

            // Подсветка
            document.querySelectorAll('#users-list li').forEach(li => {
                li.classList.toggle('selected', li.textContent === username);
            });
            document.querySelectorAll('#groups-list li').forEach(li => {
                li.classList.remove('selected');
            });

            // Очищаем сообщения
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            // Загружаем историю
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'get_private_history',
                    payload: {
                        with_user: username,
                        limit: 50
                    }
                }));
            }
        }

        function selectGroup(group) {
            selectedGroup = group;
            selectedUser = null;
            currentChatType = 'group';
            document.getElementById('current-recipient').textContent = group.name;
            document.getElementById('chat-type').textContent = '👥';

            // Подсветка
            document.querySelectorAll('#groups-list li').forEach(li => {
                li.classList.toggle('selected', li.getAttribute('data-group-id') == group.id);
            });
            document.querySelectorAll('#users-list li').forEach(li => {
                li.classList.remove('selected');
            });

            // Показываем контейнер с информацией о группе
            document.getElementById('group-info-container').style.display = 'block';

            // Очищаем сообщения
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            // Показываем загрузку
            messagesDiv.innerHTML = '<div style="text-align: center; color: #999;">Loading group history...</div>';

            // Запрашиваем историю группы
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'get_group_history',
                    payload: {
                        conversation_id: group.id,
                        limit: 50
                    }
                }));

                // Запрашиваем информацию о группе
                ws.send(JSON.stringify({
                    type: 'get_group_info',
                    payload: { conversation_id: group.id }
                }));
            }
        }

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С СООБЩЕНИЯМИ ==========
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        function displayPrivateMessage(payload) {
            // Удаляем приветственное сообщение если оно есть
            const welcomeMsg = document.getElementById('welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${payload.from === currentUser ? 'my-message' : ''}`;

            const time = new Date(payload.created_at).toLocaleTimeString();

            messageDiv.innerHTML = `
                <span class="sender">${payload.from}:</span>
                <span class="text">${payload.text}</span>
                <span class="time">${time}</span>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayGroupMessage(payload, checkWelcome = true) {
            if (checkWelcome) {
                // Удаляем приветственное сообщение если оно есть
                const welcomeMsg = document.getElementById('welcome-message');
                if (welcomeMsg) {
                    welcomeMsg.remove();
                }
            }

            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${payload.from === currentUser ? 'my-message' : ''} group-message`;

            const time = new Date(payload.created_at).toLocaleTimeString();

            messageDiv.innerHTML = `
                <span class="sender">${payload.from}:</span>
                <span class="text">${payload.text}</span>
                <span class="time">${time}</span>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayPrivateHistory(payload) {
            console.log("Displaying history with:", payload.with_user, "messages:", payload.messages);

            // Очищаем только если это текущий выбранный пользователь
            if (selectedUser === payload.with_user) {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = ''; // Очищаем

                if (payload.messages && payload.messages.length > 0) {
                    console.log(`Displaying ${payload.messages.length} messages`);
                    // Сообщения уже в правильном порядке (ASC)
                    payload.messages.forEach(msg => {
                        displayPrivateMessage({
                            from: msg.sender_username,
                            text: msg.text,
                            created_at: msg.created_at
                        });
                    });
                } else {
                    console.log("No messages to display");
                    // Показываем приветственное сообщение если нет истории
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'message system-message';
                    infoDiv.id = 'welcome-message';
                    infoDiv.innerHTML = `
                        <div style="background: #f0f0f0; padding: 5px; margin: 5px 0; text-align: center;">
                            No messages yet. Start conversation with ${payload.with_user}!
                        </div>
                    `;
                    messagesDiv.appendChild(infoDiv);
                }
            }
        }

        function displayGroupHistory(payload) {
            console.log("Displaying group history for:", payload.group_name, "messages:", payload.messages);

            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = ''; // Очищаем

            if (payload.messages && payload.messages.length > 0) {
                payload.messages.forEach(msg => {
                    displayGroupMessage({
                        from: msg.sender_username,
                        text: msg.text,
                        created_at: msg.created_at,
                        group_name: payload.group_name
                    }, false); // false = не проверять приветствие
                });
            } else {
                const infoDiv = document.createElement('div');
                infoDiv.className = 'message system-message';
                infoDiv.id = 'welcome-message';
                infoDiv.innerHTML = `
                    <div style="background: #f0f0f0; padding: 5px; margin: 5px 0; text-align: center;">
                        No messages yet in group ${payload.group_name}. Start the conversation!
                    </div>
                `;
                messagesDiv.appendChild(infoDiv);
            }
        }

        function displayGroupInfo(groupInfo) {
            const container = document.getElementById('group-info-container');

            let membersList = '';
            groupInfo.members.forEach(member => {
                membersList += `<li>${member}</li>`;
            });

            container.innerHTML = `
                <div style="font-weight: bold;">Group: ${groupInfo.name}</div>
                <div style="font-size: 0.9em; color: #666;">Created by: ${groupInfo.created_by}</div>
                <div style="margin-top: 5px;">
                    <span style="font-weight: bold;">Members:</span>
                    <ul style="margin:5px 0 0 20px;">${membersList}</ul>
                </div>
            `;

            container.style.display = 'block';
        }

        function removeSendingIndicator() {
            const messages = document.getElementById('messages').children;
            if (messages.length > 0) {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg.innerHTML.includes('(sending...)')) {
                    lastMsg.innerHTML = lastMsg.innerHTML.replace('<span style="font-size:0.8em; color:#999;"> (sending...)</span>', '');
                }
            }
        }

        // ========== ФУНКЦИИ ОТПРАВКИ СООБЩЕНИЙ ==========
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text) return;

            if (currentChatType === 'private') {
                if (!selectedUser) {
                    alert('Select a user first');
                    return;
                }

                if (ws && ws.readyState === WebSocket.OPEN) {
                    // Генерируем временный ID для сообщения
                    const tempId = 'temp-' + Date.now();

                    // Показываем своё сообщение сразу
                    const messagesDiv = document.getElementById('messages');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message my-message';
                    messageDiv.id = tempId;

                    const time = new Date().toLocaleTimeString();

                    messageDiv.innerHTML = `
                        <span class="sender">Me to ${selectedUser}:</span>
                        <span class="text">${text}</span>
                        <span class="time">${time}</span>
                        <span class="sending-indicator" style="font-size:0.8em; color:#999;"> (sending...)</span>
                    `;

                    messagesDiv.appendChild(messageDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;

                    // Отправляем на сервер
                    ws.send(JSON.stringify({
                        type: 'private_message',
                        payload: {
                            to: selectedUser,
                            text: text
                        }
                    }));

                    input.value = '';
                }
            } else if (currentChatType === 'group') {
                if (!selectedGroup) {
                    alert('Select a group first');
                    return;
                }

                if (ws && ws.readyState === WebSocket.OPEN) {
                    // Генерируем временный ID для сообщения
                    const tempId = 'temp-' + Date.now();

                    // Показываем своё сообщение сразу
                    const messagesDiv = document.getElementById('messages');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message my-message';
                    messageDiv.id = tempId;

                    const time = new Date().toLocaleTimeString();

                    messageDiv.innerHTML = `
                        <span class="sender">Me to ${selectedGroup.name}:</span>
                        <span class="text">${text}</span>
                        <span class="time">${time}</span>
                        <span class="sending-indicator" style="font-size:0.8em; color:#999;"> (sending...)</span>
                    `;

                    messagesDiv.appendChild(messageDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;

                    // Отправляем на сервер
                    ws.send(JSON.stringify({
                        type: 'group_message',
                        payload: {
                            conversation_id: selectedGroup.id,
                            text: text
                        }
                    }));

                    input.value = '';
                }
            }
        }

        // ========== ФУНКЦИИ ДЛЯ ЗАПРОСОВ ==========
        function getOnlineUsers() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'get_online_users',
                    payload: {}
                }));
            }
        }

        function getMyGroups() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'get_my_groups',
                    payload: {}
                }));
            }
        }

        // ========== ФУНКЦИИ ДЛЯ СОЗДАНИЯ ГРУПП ==========
        function showCreateGroupForm() {
            document.getElementById('create-group-form').style.display = 'block';
            updateAvailableUsers();
        }

        function hideCreateGroupForm() {
            document.getElementById('create-group-form').style.display = 'none';
        }

        function createGroup() {
            const name = document.getElementById('group-name').value.trim();
            console.log("Group name:", name);

            const checkboxes = document.querySelectorAll('#available-users input:checked');
            console.log("Checkboxes found:", checkboxes.length);

            const members = Array.from(checkboxes).map(cb => {
                console.log("Checkbox value:", cb.value);
                return cb.value;
            });

            console.log("Selected members:", members);

            if (!name) {
                alert('Enter group name');
                return;
            }

            if (members.length === 0) {
                alert('Select at least one member');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = {
                    type: 'create_group',
                    payload: {
                        name: name,
                        members: members
                    }
                };
                console.log("Sending payload:", payload);
                ws.send(JSON.stringify(payload));
            } else {
                alert('WebSocket not connected');
            }

            hideCreateGroupForm();
            document.getElementById('group-name').value = '';
        }

        // ========== ОБРАБОТЧИК КЛАВИШИ ENTER ==========
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
